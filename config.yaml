flask:
  host: "0.0.0.0"
  port: 5000
  debug: false

# Socket 服务器配置（EA 连接到此端口）
socket_server:
  host: "0.0.0.0"
  port: 9000

# 交易默认配置
trading:
  default_symbol: "EURUSD"
  default_volume: 0.1
  default_sl_points: 100
  default_tp_points: 200

# 安全设置
security:
  api_token: ""  # 可选，留空则不验证
  allowed_ips: []  # 允许的 IP 列表，空则不限制
