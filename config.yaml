flask:
  host: "0.0.0.0"
  port: 5000
  debug: false

mt5_connections:
  - id: "MT5_001"
    ip: "127.0.0.1"
    port: 9000
    description: "主账户"
    enabled: true
  - id: "MT5_002"
    ip: "127.0.0.1"
    port: 9001
