# 企业微信客服机器人 - Nginx 反向代理配置
# ============================
# 用途：443端口HTTPS请求转发到Python Flask服务器
# 服务器：Linux
# SSL 证书目录：/data/ssl_cert
#
# 使用方法：
#   1. 将此文件复制到 /etc/nginx/nginx.conf 替换原文件
#   2. 检查下方证书文件名是否正确
#   3. 测试配置：nginx -t
#   4. 重启 nginx：nginx -s reload
#

# 进程数（auto=自动检测CPU核心数）
worker_processes auto;

# 错误日志
error_log /var/log/nginx/error.log warn;


# 事件模块
events {
    # 单个worker最大连接数
    worker_connections 1024;
    # 使用epoll（Linux高性能I/O模型）
    use epoll;
}

# ========== TCP Stream 模块 - EA Socket 连接 ==========
stream {
    # Stream 日志
    log_format stream_log '$remote_addr [$time_local] '
                          '$protocol $status $bytes_sent $bytes_received '
                          '$session_time "$upstream_addr"';
    access_log /var/log/nginx/stream_access.log stream_log;

    # Upstream 定义 - 解决 stream 转发问题
    upstream ea_socket_backend {
        server 127.0.0.1:9000;
    }

    # 方式1: 直接转发 8088 端口
    # EA 连接 aigpt6.com:8088
    server {
        listen 8088;
        proxy_pass ea_socket_backend;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
        proxy_buffer_size 16k;
    }
    
    # 方式2: /tvmt5/socket/ 路径转发（可选）
    # 注意：需要单独的监听端口，不能在 http location 中做 TCP 代理
    # 如果要用路径方式，EA 配置: aigpt6.com:8089 -> nginx -> 127.0.0.1:9000
    server {
        listen 8089;
        proxy_pass 127.0.0.1:9000;
        proxy_timeout 300s;
        proxy_connect_timeout 10s;
    }
}

# HTTP 模块
http {
    # 引入MIME类型
    # include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # 日志格式
    # log_format main '$remote_addr - $remote_user [$time_local] "$request" '
    #                 '$status $body_bytes_sent "$http_referer" '
    #                 '"$http_user_agent" "$http_x_forwarded_for"';
    # access_log /var/log/nginx/access.log main;

    # 高性能基础设置
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # ========== 包含其他配置目录 ==========
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;

    # ========== 企业微信回调 - HTTP 强制跳转 HTTPS ==========
    server {
        listen 80;
        server_name aigpt6.com;

        # 强制跳转 HTTPS
        return 301 https://$server_name$request_uri;
    }

    # ========== 企业微信回调 - HTTPS 主服务器 ==========
    server {
        listen 443 ssl;
        server_name aigpt6.com;

        # ========== SSL 证书配置 ==========
        ssl_certificate     /data/ssl_cert/fullchain.pem;
        ssl_certificate_key /data/ssl_cert/privkey.key;

        # SSL 安全配置
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # ========== 日志 ==========
        access_log /var/log/nginx/wechat_access.log;
        error_log  /var/log/nginx/wechat_error.log;

        # ========== /tvmt5/ 路由 - 转发到本地 5000 端口 ==========
        location /tvmt5/ {
            proxy_pass http://127.0.0.1:5000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            client_max_body_size 10M;
        }

        # ========== Socket.IO WebSocket 支持 ==========
        location /socket.io/ {
            proxy_pass http://127.0.0.1:5000/socket.io/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 支持（关键配置）
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;
        }

        # ========== 所有请求统一代理到后端（Flask + Socket.IO） ==========
        # 后端 Flask 处理所有路由，新增接口无需修改 nginx
        location / {
            proxy_pass http://127.0.0.1:5000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket 支持
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_pass_request_body on;
            proxy_pass_request_headers on;
            proxy_connect_timeout 10s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            client_max_body_size 10M;
        }

        # ========== 安全头 ==========
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }
}
