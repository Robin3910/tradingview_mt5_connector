<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TradingView-MT5 Bridge Dashboard</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-primary: #0f1419;
            --bg-secondary: #1a2332;
            --bg-card: #1e2a3a;
            --text-primary: #e7e9ea;
            --text-secondary: #8899a6;
            --accent: #1d9bf0;
            --success: #00ba7c;
            --warning: #ffad1f;
            --danger: #f4212e;
            --border: #2f3d50;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent), #0a66c2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--danger);
        }

        .status-dot.connected {
            background: var(--success);
            box-shadow: 0 0 10px var(--success);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
        }

        .stat-value.success { color: var(--success); }
        .stat-value.warning { color: var(--warning); }
        .stat-value.danger { color: var(--danger); }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .connections-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .connection-card {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .connection-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .connection-header {
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .connection-id {
            font-size: 16px;
            font-weight: 600;
        }

        .connection-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .connection-status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--danger);
        }

        .connection-status .dot.online {
            background: var(--success);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .connection-body {
            padding: 20px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-label {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .info-value {
            font-size: 14px;
            font-weight: 500;
        }

        .account-info {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .balance-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }

        .balance-label {
            color: var(--text-secondary);
        }

        .balance-value {
            font-size: 18px;
            font-weight: 700;
        }

        .balance-value.profit {
            color: var(--success);
        }

        .balance-value.loss {
            color: var(--danger);
        }

        .events-section {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .events-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .events-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .event-item {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
        }

        .event-item:hover {
            background: var(--bg-secondary);
        }

        .event-time {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 80px;
        }

        .event-type {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .event-type.success {
            background: rgba(0, 186, 124, 0.2);
            color: var(--success);
        }

        .event-type.error {
            background: rgba(244, 33, 46, 0.2);
            color: var(--danger);
        }

        .event-type.info {
            background: rgba(29, 155, 240, 0.2);
            color: var(--accent);
        }

        .event-message {
            flex: 1;
            font-size: 14px;
        }

        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .no-connections {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .webhook-section {
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border);
            padding: 20px;
            margin-bottom: 24px;
        }

        .webhook-url {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 12px;
        }

        .webhook-url code {
            flex: 1;
            background: var(--bg-primary);
            padding: 12px 16px;
            border-radius: 8px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 14px;
            color: var(--accent);
            overflow-x: auto;
        }

        .copy-btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: opacity 0.2s;
        }

        .copy-btn:hover {
            opacity: 0.8;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            animation: slideIn 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 768px) {
            .connections-grid {
                grid-template-columns: 1fr;
            }

            .info-grid {
                grid-template-columns: 1fr;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <div class="logo-icon">📡</div>
                <h1>TradingView-MT5 Bridge</h1>
            </div>
            <div class="status-indicator">
                <span class="status-dot" id="serverStatus"></span>
                <span id="serverStatusText">Connecting...</span>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">连接数</div>
                <div class="stat-value" id="totalConnections">0 / 0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">在线账户</div>
                <div class="stat-value success" id="onlineCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">总持仓</div>
                <div class="stat-value" id="totalPositions">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">服务器时间</div>
                <div class="stat-value" style="font-size: 16px;" id="serverTime">--:--:--</div>
            </div>
        </div>

        <div class="webhook-section">
            <div class="section-title">🔗 Webhook URL</div>
            <div class="webhook-url">
                <code id="webhookUrl">http://localhost:5000/webhook</code>
                <button class="copy-btn" onclick="copyWebhook()">复制</button>
            </div>
        </div>

        <div class="section-title">📊 MT5 连接状态</div>
        <div class="connections-grid" id="connectionsGrid">
            <div class="no-connections">
                <div style="font-size: 48px; margin-bottom: 16px;">🔌</div>
                <div>等待 MT5 EA 连接...</div>
            </div>
        </div>

        <div class="events-section">
            <div class="events-header">
                <div class="section-title" style="margin: 0;">📋 事件日志</div>
                <button class="copy-btn" onclick="clearEvents()" style="padding: 6px 12px; font-size: 12px;">清除</button>
            </div>
            <div class="events-list" id="eventsList">
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <div>暂无事件</div>
                </div>
            </div>
        </div>
    </main>

    <div class="toast" id="toast"></div>

    <script>
        const socket = io();
        let events = [];

        socket.on('connect', () => {
            document.getElementById('serverStatus').classList.add('connected');
            document.getElementById('serverStatusText').textContent = '已连接';
            showToast('已连接到服务器', 'success');
            socket.emit('request_status');
        });

        socket.on('disconnect', () => {
            document.getElementById('serverStatus').classList.remove('connected');
            document.getElementById('serverStatusText').textContent = '已断开';
            showToast('与服务器断开连接', 'error');
        });

        socket.on('status_update', (data) => {
            updateStats(data);
            updateConnections(data.mt5_connections);
            document.getElementById('serverTime').textContent = new Date(data.server_time).toLocaleTimeString();
        });

        socket.on('trade_executed', (data) => {
            addEvent('success', '交易执行', JSON.stringify(data.result.details));
        });

        socket.on('trade_error', (data) => {
            addEvent('error', '交易错误', data.error);
        });

        socket.on('mt5_event', (data) => {
            const eventType = data.event.replace('_', ' ').toUpperCase();
            addEvent('info', data.connection_id, `${eventType}: ${JSON.stringify(data.data)}`);
        });

        function updateStats(data) {
            document.getElementById('totalConnections').textContent =
                `${data.active_connections} / ${data.total_connections}`;
            document.getElementById('onlineCount').textContent = data.active_connections;

            let totalPositions = 0;
            for (const conn of Object.values(data.mt5_connections)) {
                totalPositions += conn.positions_count || 0;
            }
            document.getElementById('totalPositions').textContent = totalPositions;
        }

        function updateConnections(connections) {
            const grid = document.getElementById('connectionsGrid');

            if (Object.keys(connections).length === 0) {
                grid.innerHTML = `
                    <div class="no-connections">
                        <div style="font-size: 48px; margin-bottom: 16px;">🔌</div>
                        <div>等待 MT5 EA 连接...</div>
                    </div>
                `;
                return;
            }

            grid.innerHTML = Object.entries(connections).map(([id, conn]) => `
                <div class="connection-card">
                    <div class="connection-header">
                        <div class="connection-id">${id}</div>
                        <div class="connection-status">
                            <span class="dot ${conn.connected ? 'online' : ''}"></span>
                            <span>${conn.connected ? '在线' : '离线'}</span>
                        </div>
                    </div>
                    <div class="connection-body">
                        <div class="info-grid">
                            <div class="info-item">
                                <span class="info-label">服务器</span>
                                <span class="info-value">${conn.ip}:${conn.port}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">重连次数</span>
                                <span class="info-value">${conn.reconnect_count}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">最后心跳</span>
                                <span class="info-value">${conn.last_heartbeat ? formatTime(conn.last_heartbeat) : '--'}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">最后消息</span>
                                <span class="info-value">${conn.last_message ? formatTime(conn.last_message) : '--'}</span>
                            </div>
                        </div>
                        ${conn.account_id ? `
                        <div class="account-info">
                            <div class="info-grid">
                                <div class="info-item">
                                    <span class="info-label">账户ID</span>
                                    <span class="info-value">${conn.account_id}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">账户名</span>
                                    <span class="info-value">${conn.account_name || '--'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">服务器</span>
                                    <span class="info-value">${conn.account_server || '--'}</span>
                                </div>
                                <div class="info-item">
                                    <span class="info-label">持仓数</span>
                                    <span class="info-value">${conn.positions_count || 0}</span>
                                </div>
                            </div>
                            <div class="balance-row">
                                <span class="balance-label">余额</span>
                                <span class="balance-value">${formatCurrency(conn.balance)}</span>
                            </div>
                            <div class="balance-row">
                                <span class="balance-label">净值</span>
                                <span class="balance-value ${conn.equity - conn.balance >= 0 ? 'profit' : 'loss'}">
                                    ${formatCurrency(conn.equity)} (${formatPnL(conn.equity - conn.balance)})
                                </span>
                            </div>
                        </div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }

        function addEvent(type, title, message) {
            const event = {
                time: new Date().toISOString(),
                type: type,
                title: title,
                message: message
            };
            events.unshift(event);
            if (events.length > 100) events.pop();
            renderEvents();
        }

        function renderEvents() {
            const list = document.getElementById('eventsList');
            if (events.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <div>暂无事件</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = events.map(e => `
                <div class="event-item">
                    <span class="event-time">${formatTime(e.time)}</span>
                    <span class="event-type ${e.type}">${e.title}</span>
                    <span class="event-message">${e.message}</span>
                </div>
            `).join('');
        }

        function clearEvents() {
            events = [];
            renderEvents();
        }

        function copyWebhook() {
            const url = document.getElementById('webhookUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                showToast('Webhook URL 已复制', 'success');
            });
        }

        function showToast(message, type) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show';
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function formatTime(isoString) {
            if (!isoString) return '--';
            const date = new Date(isoString);
            return date.toLocaleTimeString();
        }

        function formatCurrency(value) {
            if (value === undefined || value === null) return '$0.00';
            return '$' + value.toFixed(2);
        }

        function formatPnl(value) {
            if (value === undefined || value === null) return '$0.00';
            const sign = value >= 0 ? '+' : '';
            return sign + '$' + value.toFixed(2);
        }

        // 更新服务器地址显示
        document.getElementById('webhookUrl').textContent =
            window.location.origin + '/tvmt5/webhook';
    </script>
</body>
</html>
